<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Маркетплейс</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <nav>
                <a href="/" class="logo">🛒 Маркетплейс</a>
            </nav>
        </header>

        <main>
            <div class="page-header">
                <h1>Все товары</h1>
            </div>

            <!-- Statistics -->
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-value">15</span>
                    <span class="stat-label">Товаров</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">42</span>
                    <span class="stat-label">Ставок</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">12</span>
                    <span class="stat-label">Активных</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">25 000 ₽</span>
                    <span class="stat-label">Средняя цена</span>
                </div>
            </div>
             <div class="items-grid" id="items-container"></div>
        </main>

        <footer>
            <p>&copy; 2026 Маркетплейс. Все права защищены.</p>
        </footer>

        <script src="script.js"></script>
    </body>
</html>
